name: Build OTCv8 Windows (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone vcpkg
        run: git clone --depth 1 https://github.com/microsoft/vcpkg

      - name: Bootstrap vcpkg
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Update vcpkg ports
        shell: pwsh
        run: |
          git -C vcpkg pull

      - name: Reset broken zlib state (hard-clean)
        shell: pwsh
        run: |
          .\vcpkg\vcpkg remove zlib --recurse | Out-Null
          Remove-Item -Recurse -Force vcpkg\installed\${env:VCPKG_DEFAULT_TRIPLET} -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force vcpkg\buildtrees\zlib* -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force vcpkg\packages\zlib* -ErrorAction SilentlyContinue

      - name: Install dependencies (clean buildtrees/packages)
        shell: pwsh
        run: >
          .\vcpkg\vcpkg install
          boost-asio boost-system boost-iostreams boost-filesystem boost-thread boost-program-options
          boost-uuid boost-random boost-date-time boost-regex boost-beast
          libzip zlib bzip2 luajit physfs openssl openal-soft libvorbis libogg glew
          --triplet ${env:VCPKG_DEFAULT_TRIPLET}
          --clean-after-build --clean-buildtrees-after-build --clean-packages-after-build

      - name: Configure CMake
        shell: pwsh
        run: >
          cmake -B build -S .
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${env:VCPKG_DEFAULT_TRIPLET}
          -A x64

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release
