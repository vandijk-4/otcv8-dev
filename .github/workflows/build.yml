name: Build OTCv8 Windows

on:
push:
branches: [ main ]
workflow_dispatch:

jobs:
build:
runs-on: windows-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Clone vcpkg
    shell: cmd
    run: git clone https://github.com/microsoft/vcpkg

  - name: Bootstrap vcpkg
    shell: cmd
    run: .\vcpkg\bootstrap-vcpkg.bat

  - name: Install dependencies
    shell: cmd
    run: >
      .\vcpkg\vcpkg install
      boost-asio boost-system boost-filesystem boost-beast
      libzip zlib bzip2 luajit physfs openssl
      openal-soft libvorbis libogg glew
      --triplet x64-windows

  - name: Configure
    shell: cmd
    run: >
      cmake -B build -S .
      -DCMAKE_TOOLCHAIN_FILE=.\vcpkg\scripts\buildsystems\vcpkg.cmake
      -DVCPKG_TARGET_TRIPLET=x64-windows

  - name: Build
    shell: cmd
    run: cmake --build build --config Release

  - name: Package build
    shell: cmd
    run: |
      mkdir artifact
      xcopy build\Release artifact /E /I

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: otc-client-windows
      path: artifact

