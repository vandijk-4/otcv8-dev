name: Build OTCv8 Windows (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies
        run: .\vcpkg\vcpkg install boost-asio boost-system boost-iostreams boost-filesystem boost-thread boost-program-options boost-uuid boost-random boost-date-time boost-regex boost-beast

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake -A x64

      - name: Build
        run: cmake --build build --config Release
