name: Build OTCv8 Windows (Modern CI)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ''

      - name: Install dependencies
        run: |
          vcpkg install ^
            boost-system:x86-windows ^
            boost-filesystem:x86-windows ^
            boost-asio:x86-windows ^
            glew:x86-windows ^
            physfs:x86-windows ^
            luajit:x86-windows ^
            zlib:x86-windows ^
            openssl:x86-windows ^
            openal-soft:x86-windows ^
            libzip:x86-windows

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. ^
            -G "Visual Studio 17 2022" ^
            -A Win32 ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otc-client-windows
          path: build/Release/
