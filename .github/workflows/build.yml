name: Build OTCv8 Windows (vcpkg MSVC)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone vcpkg (old compatible version)
        shell: cmd
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout 3b3bd424827a1f7f4813216f6b32b6c61e386b2e
          bootstrap-vcpkg.bat

      - name: Install dependencies
        shell: cmd
        run: |
          cd vcpkg
          vcpkg install ^
            boost-system:x86-windows-static ^
            boost-filesystem:x86-windows-static ^
            boost-asio:x86-windows-static ^
            glew:x86-windows-static ^
            physfs:x86-windows-static ^
            luajit:x86-windows-static ^
            zlib:x86-windows-static ^
            openssl:x86-windows-static ^
            openal-soft:x86-windows-static ^
            libzip:x86-windows-static

      - name: Configure
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. ^
            -G "Visual Studio 17 2022" ^
            -A Win32 ^
            -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DUSE_STATIC_LIBS=ON

      - name: Build
        shell: cmd
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otc-client-windows
          path: build/Release/
