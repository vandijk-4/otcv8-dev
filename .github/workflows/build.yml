name: Build OTCv8 Windows (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies
        run: >
        run: >
          .\vcpkg\vcpkg install zlib:x64-windows
          boost-asio boost-system boost-iostreams boost-filesystem boost-thread boost-program-options
          boost-uuid boost-random boost-date-time boost-regex boost-beast
          libzip bzip2 luajit physfs openssl openal-soft libvorbis libogg glew
          boost-asio boost-system boost-iostreams boost-filesystem boost-thread boost-program-options
          boost-uuid boost-random boost-date-time boost-regex boost-beast
          libzip zlib bzip2 luajit physfs openssl openal-soft libvorbis libogg glew

      - name: Configure CMake
        run: >
          cmake -B build -S .
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -A x64

      - name: Build
        run: cmake --build build --config Release
