name: Build OTCv8 Windows (CI)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone vcpkg
        shell: cmd
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          bootstrap-vcpkg.bat
          vcpkg integrate install

      - name: Install dependencies
        shell: cmd
        run: |
          cd vcpkg
          vcpkg install boost-system:x86-windows-static boost-filesystem:x86-windows-static boost-asio:x86-windows-static boost-beast:x86-windows-static glew:x86-windows-static physfs:x86-windows-static luajit:x86-windows-static zlib:x86-windows-static openssl:x86-windows-static openal-soft:x86-windows-static libzip:x86-windows-static

      - name: Configure
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. ^
            -G "Visual Studio 17 2022" ^
            -A Win32 ^
            -DCMAKE_TOOLCHAIN_FILE=%CD%\..\vcpkg\scripts\buildsystems\vcpkg.cmake ^
            -DCMAKE_PREFIX_PATH=%CD%\..\vcpkg\installed\x86-windows-static

      - name: Build
        shell: cmd
        run: |
          cd build
          cmake --build . --config Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otc-client-windows
          path: build/Release/
