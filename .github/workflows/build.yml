name: OTCv8 CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    env:
      VCPKG_DISABLE_METRICS: 1
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      TRIPLET: x86-windows-static

    steps:
      - uses: actions/checkout@v4

      - name: Tools for OpenSSL (perl + nasm)
        shell: powershell
        run: |
          choco install -y strawberryperl nasm
          echo "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\NASM"   | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Clone vcpkg (pinned)
        shell: cmd
        run: |
          git clone https://github.com/microsoft/vcpkg
          cd vcpkg
          git checkout 3b3bd424827a1f7f4813216f6b32b6c61e386b2e

      - name: Bootstrap vcpkg
        shell: cmd
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Install dependencies (single command, README list)
        shell: cmd
        run: |
          .\vcpkg\vcpkg install ^
            boost-iostreams:%TRIPLET% boost-asio:%TRIPLET% boost-beast:%TRIPLET% boost-system:%TRIPLET% ^
            boost-variant:%TRIPLET% boost-lockfree:%TRIPLET% boost-process:%TRIPLET% boost-program-options:%TRIPLET% ^
            luajit:%TRIPLET% glew:%TRIPLET% boost-filesystem:%TRIPLET% boost-uuid:%TRIPLET% ^
            physfs:%TRIPLET% openal-soft:%TRIPLET% libogg:%TRIPLET% libvorbis:%TRIPLET% ^
            zlib:%TRIPLET% libzip:%TRIPLET% openssl:%TRIPLET% ^
            --clean-after-build --clean-buildtrees-after-build --clean-packages-after-build

      - name: Configure (Win32 + vcpkg toolchain)
        shell: cmd
        run: |
          cmake -B build -S . -A Win32 ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=%TRIPLET%

      - name: Build
        shell: cmd
        run: cmake --build build --config Release

      - name: Upload vcpkg logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-logs
          path: |
            vcpkg/buildtrees/**/config*.log
            vcpkg/buildtrees/**/build*.log
            vcpkg/buildtrees/**/install*.log
            vcpkg/buildtrees/**/*.log
